<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00C853;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00E676;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Monograma VW Estilizado -->
  <path d="M10 25L30 75L50 25" stroke="url(#logo-grad)" stroke-width="8" stroke-linecap="butt" filter="url(#glow)"/>
  <path d="M50 25L70 75L90 25" stroke="url(#logo-grad)" stroke-width="8" stroke-linecap="butt" filter="url(#glow)"/>
  <!-- Sub-traço técnico -->
  <path d="M10 85H90" stroke="url(#logo-grad)" stroke-width="2" stroke-dasharray="10 5" opacity="0.5"/>
</svg>
